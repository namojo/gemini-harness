description = "생성된 하네스를 실제로 실행. 사용: /harness:run \"실행할 작업 지시\""

prompt = """
실행 요청: {{args}}

## 0단계 — **먼저 당신(Gemini CLI)이 가진 도구로 컨텍스트 수집**

harness.run은 별도 프로세스에서 실행되므로 당신의 내장 도구(file-manager, google-search, 등록된 MCP 서버)에 접근할 수 없습니다. **따라서 실행 전에 필요한 데이터를 수집해 user_input에 동봉**하세요.

판단:
- 사용자가 파일 경로 언급 → file-manager로 읽어서 user_input에 첨부
- 디렉토리/글롭 필요 → glob/list 결과 첨부
- 외부 지식 필요 → google-search 또는 등록된 MCP 서버 조회 결과 첨부

**절대 금지:** 수집 없이 곧바로 harness.run 호출 → 에이전트들이 허구 생성 또는 파일 요청으로 멈춤.

## 1단계 — 진행 안내 (짧게)

`workflow.json`을 Read로 읽고 에이전트 수만 확인.

**write_todos 호출은 생략**합니다 — 이유:
- harness.run은 블로킹이라 중간 업데이트가 불가능
- 병렬 실행은 MCP 서버 내부에서 일어나므로 실시간으로 HUD를 갱신할 수 없음
- 긴 todo 패널이 좁은 터미널을 점유하면 가독성이 떨어짐

대신 **한 줄 자연어 안내**로:
> 🚀 harness 실행 시작 — {pattern} 패턴, {N}명 에이전트, 예상 {estimated}초.

## 2단계 — harness.run 호출

`mcp_harness_harness_run` 파라미터:
- `project_path`: 절대 경로
- `user_input`: 0단계에서 확장된 pre-collected 콘텐츠 포함 버전
- `step_limit`: 기본 50 (간단히 언급 시 15)

## 3단계 — 완료 직후 HUD 단 1회 갱신 (필요시에만)

응답을 받은 **직후 단 한 번**, 최종 결과를 `write_todos`로 기록합니다. **사용자가 요청한 경우에만** 호출하고, 기본은 생략:

### 기본(간결): write_todos **호출 안 함**
곧바로 4단계의 텍스트 요약만 보여줍니다. 가장 터미널 친화적.

### 선택(요청 시): `write_todos` 단 1회
사용자가 "진행 상태 보여줘" 같은 요청을 했다면, **짧은 한 줄 항목**으로만 갱신:

```json
write_todos(todos=[
  {"description": "✅ 하네스 실행 (N/M · Ks)", "status": "completed"},
  {"description": "✅ frontend · FE", "status": "completed"},
  {"description": "✅ backend · API", "status": "completed"},
  {"description": "⚠ db · 블로킹", "status": "blocked"}
])
```

**description은 30자 이내 엄수**. 아이콘(✅/⚠/❌)만 앞에, 뒤는 에이전트 별칭 + 1~2단어 역할. 절대 full role 본문 복사 금지.

## 4단계 — 결과 요약 (항상 실행, 터미널 친화적)

다음 포맷으로 **압축**해서 마크다운 한 블록으로 보고:

```
## 🎯 harness.run 결과

- **패턴:** {pattern} · {wall_clock_ms/1000}s · {input_tokens}→{output_tokens} tokens
- **에이전트:** ✅ completed N / ⚠ blocked M / ⭕ idle K
- **산출물:** {len(artifacts)} files · 주요: `_workspace/{agent}/report.md` …
- **에러:** (있으면) `create_agent_loop_aborted` 같은 주요 오류만 1~2줄로

### 핵심 산출물 미리보기

(가장 중요한 산출물 1개만 file-manager로 읽고 처음 15~20줄 표시. 나머지는 경로만 나열)
```

## 5단계 — 후속 제안 (짧게)

- 에이전트 정의 문제(loop_aborted 등) → `/harness:evolve "..."` 제안
- 중단된 작업 재개 필요 → `harness.run(run_id="<기존>", resume=true)` 제안
- 결과물 상세 확인 → `_workspace/{agent}/*.md` 경로 안내

## 핵심 원칙 (좁은 터미널 대응)

1. **write_todos는 부득이한 경우 1회**, 기본은 **호출 안 함**
2. **todo description은 30자 이내** (아이콘 + 짧은 별칭 + 최대 2단어)
3. **Plan mode 설명도 60자 이내**로 요약 — 긴 문단 금지
4. 마크다운 테이블 행이 길어지지 않도록 열 수 최소화
5. 사용자가 "상세"를 명시 요청할 때만 전체 출력
"""

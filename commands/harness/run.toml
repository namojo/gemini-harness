description = "생성된 하네스를 실제로 실행. 사용: /harness:run \"실행할 작업 지시\""

prompt = """
실행 요청: {{args}}

## 0단계 — **먼저 당신(Gemini CLI)이 가진 도구로 컨텍스트 수집**

harness.run은 별도 프로세스에서 실행되므로 당신의 내장 도구(file-manager, google-search, write_todos, 기타 등록된 MCP 서버)에 접근할 수 없습니다. **따라서 실행을 시작하기 전에 반드시 당신이 직접 필요한 데이터를 수집해 user_input에 동봉**하세요. 이 단계가 "재구현 대신 재사용"의 핵심 경로입니다.

판단 기준:
- 사용자가 파일 경로를 언급했는가? → **file-manager로 읽어서** 내용을 user_input에 첨부
- 디렉토리/글롭이 필요한가? → `glob` / `list` 결과를 첨부
- 외부 지식이 필요한가? → **google-search 또는 등록된 MCP 서버**로 조회 결과 첨부
- 사용자의 다른 MCP 서버(github, slack, db 등)가 필요한가? → 해당 도구 호출 후 결과 첨부

수집이 끝나면 user_input을 구조화된 형태로 확장하세요. 예:

```
원문 요청:
{{args}}

[참조 파일]
- src/gemini_harness/cli.py:
```python
<파일 내용 전체 또는 발췌>
```

[검색 결과]
- Python argparse 모범 사례: …
```

**절대 하지 말 것:** 수집 없이 곧바로 harness.run 호출 → 내부 에이전트들이 허구의 사실을 생성하거나 "파일이 필요하다"며 멈춤.

## 1단계 — 실행 계획 HUD 표시

`workflow.json`을 Read로 읽어 `initial_registry` 목록 확보 → `write_todos`로 각 에이전트를 `pending`으로 등록:

```
write_todos(todos=[
  {"description": "{{agent.id}}: {{agent.role 첫 50자}}", "status": "pending"},
  ...
])
```

## 2단계 — harness.run 호출

`mcp_harness_harness_run` 도구 파라미터:
- `project_path`: 현재 작업 디렉토리 절대 경로
- `user_input`: 0단계에서 확장된 **pre-collected 콘텐츠 포함 버전**
- `step_limit`: 기본 50 (간단히 언급 시 15)

실행에는 수십 초~수 분이 걸립니다.

## 3단계 — 완료 후 HUD 업데이트

응답의 `agent_timeline`을 사용해 `write_todos` 재호출. `status`는 응답의 각 항목 그대로 매핑:
- `completed` → `"completed"`
- `blocked` → `"blocked"` (에러가 있는 에이전트)
- `idle` → `"cancelled"` (실행되지 않은 에이전트)

## 4단계 — 결과 요약 + 후속 처리

응답 중 다음을 사용자에게 보고:

- `steps`, `wall_clock_ms`: 성능 지표
- `errors`: 비어있어야 정상
  - `create_agent_loop_aborted` 있으면 에이전트 정의 문제 → `/harness:evolve` 제안
- `artifacts`: 생성된 파일 경로. **가장 중요한 1~2개**를 file-manager로 읽어 핵심 20줄 정도 사용자에게 표시
- **응답의 `history_tail`에서 에이전트가 `pending_requests`나 `needs_user_input` 같은 미처리 요청을 남겼다면 이를 명시적으로 보고하고, 필요 시 추가 정보 수집 후 `/harness:run`을 다시 호출(`resume=true`)** — 이게 "mid-run 요청 → 당신이 도구로 해결 → 재개" 프로토콜
"""

description = "생성된 하네스를 실제로 실행. 사용: /harness:run \"실행할 작업 지시\""

prompt = """
실행 요청: {{args}}

## 1단계 — 실행 계획 HUD 표시 (필수, 실행 전)

먼저 `workflow.json`을 Read로 읽어 `initial_registry`의 에이전트 목록을 확보하세요.
그런 다음 **반드시 `write_todos`를 호출**하여 각 에이전트를 "pending" 상태 항목으로 등록:

```
write_todos(todos=[
  {"description": "{{agent.id}}: {{agent.role 첫 50자}}", "status": "pending"},
  ...
])
```

이렇게 해야 Gemini CLI HUD(입력 프롬프트 위)에 실행 계획이 표시됩니다.

## 2단계 — harness.run 호출

`mcp_harness_harness_run` 도구를 다음 파라미터로 호출:

- `project_path`: 현재 작업 디렉토리 절대 경로
- `user_input`: "{{args}}" — 비어있으면 사용자에게 무엇을 실행할지 물어보기
- `step_limit`: 기본 50. 사용자가 "간단히" 언급하면 15로 제한

**중요:** 실행은 실제 Gemini API를 호출하며 수십 초~수 분 걸립니다. MCP 서버가 별도 진행 알림을
송출하지만 Gemini CLI HUD는 현재 이를 직접 렌더링하지 않으므로, 사전에 todos로 계획을 등록하는 것이
사용자에게 진행 상황을 보여주는 주 경로입니다.

## 3단계 — 완료 후 HUD 업데이트

응답의 `final_registry`에서 각 에이전트의 상태를 확인하고 `write_todos`로 **동일 목록을 status만
갱신**하여 다시 호출:

```
write_todos(todos=[
  {"description": "...", "status": "completed"},  # 정상 완료한 에이전트
  {"description": "...", "status": "blocked"},    # 에러 있는 에이전트
  ...
])
```

## 4단계 — 결과 요약

응답 중 다음을 사용자에게 보고:

- `steps`: 실행된 Manager↔Worker 사이클 수
- `errors`: 비어있어야 정상. `create_agent_loop_aborted`가 있으면 특정 에이전트가 반복 실패한 것 →
  해당 에이전트 정의 수정 권유 (`/harness:evolve`)
- `artifacts`: 생성된 파일 개수와 대표 경로 3~5개
- `context_md_path`: 실시간 실행 로그가 기록된 `.gemini/context.md` 경로

**최종:** artifacts 중 가장 중요한 1~2개 파일을 Read로 읽어 핵심 내용(처음 20줄 정도)을 사용자에게
보여주세요.
"""
